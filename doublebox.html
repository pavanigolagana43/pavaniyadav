<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-Index Property</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
        }
        
        .box1 {
            width: 200px;
            height: 200px;
            background-color: red;
            position: absolute;
            z-index: 1; /* Lower number = goes behind */
        }
        
        .box2 {
            width: 200px;
            height: 200px;
            background-color: blue;
            position: absolute;
            left: 50px;
            top: 50px;
            z-index: 2; /* Higher number = comes in front */
        }
    </style>
</head>
<body>
    <div class="box1"></div>
    <div class="box2"></div>
</body>
</html>
