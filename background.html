<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Image</title>
    <style>
        body {
            background-image: url("https://picsum.photos/800/600");
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            margin: 0;
            font-family: 'Times New Roman', serif;
        }
        
        h1 {
            color: white;
            font-size: 48px;
            padding: 20px;
            margin: 0;
        }
        
        .box {
            width: 145px;
            padding: 50px;
            border: 10px solid #e53137; /* Red border */
            margin: 75px;
            background-color: rgb(29, 215, 26); /* Green box */
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>This is a paragraph with a<br>background image</h1>
    
    <div class="box">
        This is a box!
    </div>
</body>
</html>
