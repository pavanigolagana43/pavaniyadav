<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box</title>
    <style>
        body {
            background-color: lightblue;
        }
        
        h1 {
            color: #d63384; /* Purple/pink color */
            font-size: 32px;
            font-family: 'Times New Roman', serif;
        }
        
        .box {
            width: 145px;
            padding: 50px;
            border: 10px solid #3131e5; /* Blue border */
            margin: 75px;
            background-color: rgb(171, 26, 215); /* Purple box */
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>This is how a class is being used in html file<br>to address contents</h1>
    
    <div class="box">
        This is a box!
    </div>
</body>
</html>
