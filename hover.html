<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hover</title>
    <style>
        button {
            background-color: hsl(120, 68%, 48%); /* Green */
            border: none;
            color: white;
            font-size: 16px;
            padding: 10px 20px;
            cursor: pointer; /* Shows hand cursor on hover */
        }
        
        button:hover {
            background-color: hsl(120, 68%, 35%); /* Darker green */
        }
    </style>
</head>
<body>
    <button>Hover me!</button>
</body>
</html>
